<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포커스 — 난독증 친화 뽀모도로</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  /* 피치마켓체 — HTML과 같은 폴더에 PeachMarket-Regular.otf / .ttf 두기 */
  @font-face {
    font-family: 'PeachMarket';
    src: url('./PeachMarket-Regular.woff2') format('woff2'),
         url('./PeachMarket-Regular.woff') format('woff'),
         url('./PeachMarket-Regular.ttf') format('truetype'),
         url('./PeachMarket-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  /* 모든 요소에 피치마켓체 강제 적용 (!important로 인라인/외부 스타일도 덮어쓰기) */
  * {
    font-family: 'PeachMarket', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif !important;
  }
  /* Font Awesome 아이콘만은 자체 글꼴 유지 */
  .fa, .fas, .far, .fal, .fab,
  .fa-solid, .fa-regular, .fa-light, .fa-brands,
  [class*=" fa-"], [class^="fa-"], i.fa {
    font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
  }

  :root {
    /* ── 파스텔 라벤더 팔레트 ── */
    --cream: #F0EBF8;
    --cream-dark: #C5B4DC;
    --navy: #F5F0EB;
    --navy-soft: #5D4680;
    --navy-muted: #7B62A0;

    --blue-focus: #9B6FD0;
    --blue-light: #B48EE0;
    --blue-pale: rgba(155,111,208,0.15);

    --mint: #6DC0B0;
    --mint-light: #8ED4C6;
    --mint-pale: rgba(109,192,176,0.15);

    --warm-yellow: #F5C842;
    --warm-yellow-light: #FAE08A;
    --warm-yellow-pale: rgba(245,200,66,0.18);

    --text-primary: #2E1F4A;
    --text-secondary: #5A4470;
    --text-muted: #8B72A8;

    --bg: #EDE6F8;
    --bg-card: #F8F4FF;
    --btn-secondary: #E0D4F5;
    --btn-secondary-active: #D0BEF0;
    --shadow-soft: 0 4px 24px rgba(100,70,160,0.12);
    --shadow-card: 0 2px 16px rgba(100,70,160,0.10);
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
    /* ── WAVE TIMER ── */
    --wave-bg: #D8CCF0;
    --wave-bg-ring: rgba(155,111,208,0.35);
    --wave-fill: #9B6FD0;
    --wave-fill-2: #8358C0;
    --wave-focus: #9B6FD0;
    --wave-rest: #6DC0B0;
    --wave-rest-2: #55AAAA;
    --wave-done: #F5A0C0;
    --wave-done-2: #E888B0;
    --font-scale: 1;          /* 글자크기 배율 — 슬라이더로 1.0(보통) ~ 1.35 조절 (전체 UI) */
    --font-size-base: calc(17px * var(--font-scale));
    --letter-spacing: 0cm;    /* 자간 — 슬라이더로 0cm(보통) ~ 1cm 조절 */
    --line-height: 1.7;
    --font-weight: 400;
    --current-font: 'PeachMarket', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  /* ── 자간(letter-spacing) 전체 UI 적용 ──
     모든 텍스트 요소에 사용자 설정 자간을 강제 적용한다.
     (Font Awesome 아이콘 글리프는 제외 — 간격이 벌어지면 깨져 보임)
     :not() 3개로 특정 클래스(.section-label 0.1em 등)의 자간 선언보다
     우선순위를 높여, 슬라이더 값이 화면 전체에 균일하게 반영되도록 한다. */
  *:not(i):not([class*="fa-"]):not([class^="fa-"]) {
    letter-spacing: var(--letter-spacing);
  }

  /* 자간을 키워도 이모티콘(아이콘)은 항상 고정 — 아이콘 글리프와
     아이콘만 들어있는 버튼/래퍼에는 간격이 붙지 않도록 normal 강제 */
  i, svg,
  .fa, .fas, .far, .fal, .fab,
  .fa-solid, .fa-regular, .fa-light, .fa-brands,
  [class*="fa-"], [class^="fa-"],
  .setting-icon, .sound-icon, .sound-play, .sound-delete,
  .modal-icon-wrap, .check-box, .font-radio, .nav-item i,
  .time-step {
    letter-spacing: normal !important;
  }

  /* ── 가운데 정렬 보정 ──
     자간(letter-spacing)은 마지막 글자 뒤에도 간격을 붙이기 때문에
     가운데 정렬된 글자가 왼쪽으로 치우친다. 실측 결과 text-indent에
     자간 전체값을 주면 글자가 정확히 가운데로 온다.
     (가운데 정렬되는 텍스트 요소에만 적용) */
  .demo-tab, .session-badge, .session-label, .task-label,
  .timer-sub,
  .nav-item span,
  .time-display, .time-unit, .time-btn-val, .time-btn-unit, .time-btn-label,
  .chip, .check-tag, .checklist-empty {
    text-indent: var(--letter-spacing);
  }
  /* 왼쪽 정렬 텍스트에는 들여쓰기가 새지 않도록 0으로 되돌림 */
  .guide-line, .check-text, .modal-input { text-indent: 0; }

  /* 아이콘+글자 버튼은 flexbox로 그룹을 통째로 중앙정렬.
     (text-indent는 첫 줄만 보정해 아이콘/글자가 어긋나므로 버튼엔 안 씀) */
  .main-btn, .secondary-btn, .add-confirm-btn, .add-cancel-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    text-indent: 0;
  }
  /* 여러 줄이 될 수 있는 가운데 텍스트(모달 제목/본문)는 text-indent 보정을 끔
     — 첫 줄만 들여써서 둘째 줄과 어긋나기 때문 (text-align:center가 각 줄 중앙정렬) */
  .modal-title, .modal-body { text-indent: 0; }

  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--current-font);
    background: var(--bg);
    color: var(--text-primary);
    font-size: var(--font-size-base);
    letter-spacing: var(--letter-spacing);
    line-height: var(--line-height);
    font-weight: var(--font-weight);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease;
  }

  .phone-frame {
    width: 100%;
    min-height: 100vh;
    margin: 0;
    background: var(--bg);
    border-radius: 0;
    box-shadow: none;
    overflow: visible;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: background 0.4s ease;
  }

  /* SCREENS */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    padding: 0 0 110px;
    overflow-y: auto;
  }
  .screen.active { display: flex; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: var(--bg-card);
    border-top: 1.5px solid var(--blue-pale);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px env(safe-area-inset-bottom, 8px);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 68px;
    border: none;
    background: var(--blue-pale);
    color: var(--blue-focus);
    font-family: var(--current-font);
  }

  .nav-item i { font-size: calc(20px * var(--font-scale)); }
  .nav-item span { font-size: calc(11px * var(--font-scale)); font-weight: 500; letter-spacing: 0.02em; }

  /* ── SCREEN 1: TIMER ── */
  .timer-screen {
    align-items: center;
    padding: 0 24px 100px;
  }

  .session-badge {
    margin-top: 20px;
    padding: 8px 20px;
    background: var(--blue-pale);
    color: var(--blue-focus);
    border-radius: 40px;
    font-size: calc(14px * var(--font-scale));
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .session-label {
    margin: 20px;
    font-size: calc(15px * var(--font-scale));
    font-weight: 550;
    color: var(--text-primary);
    text-align: center;
  }

  .task-label {
    margin-top: 8px;
    font-size: calc(15px * var(--font-scale));
    color: var(--text-secondary);
    text-align: center;
    font-weight: 400;
  }

  /* ── WAVE TIMER ── */
  .timer-ring-wrap {
    position: relative;
    width: 270px;
    height: 270px;
    margin: 14px auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wave-circle {
    position: absolute;
    top: 0; left: 0;
    width: 270px;
    height: 270px;
    border-radius: 50%;
    background: var(--wave-bg);
    overflow: hidden;
    border: 2px solid var(--wave-bg-ring);
    box-shadow: 0 12px 40px var(--shadow-wave-drop, rgba(100,70,160,0.20)),
                inset 0 2px 12px rgba(100,70,160,0.10);
  }

  .wave-fill {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -8px;
    height: 8%;
    will-change: height;
  }

  .wave-surface {
    position: absolute;
    bottom: 100%;
    left: 0;
    width: 200%;
    height: 26px;
    margin-bottom: -1px;
  }
  .wave-surface svg { display: block; width: 100%; height: 100%; }

  .wave-body {
    position: absolute;
    inset: 0;
    background: var(--wave-fill);
  }
  .wave-surface .wave-path { fill: var(--wave-fill); }

  .wave-fill.back {
    height: calc(var(--fill-level, 8%) + 3%);
    opacity: 0.45;
    filter: saturate(0.9);
  }
  .wave-fill.back .wave-body { background: var(--wave-fill-2); }
  .wave-fill.back .wave-surface .wave-path { fill: var(--wave-fill-2); }

  .wave-surface.flow-front { animation: wave-flow 3.4s linear infinite; }
  .wave-surface.flow-back  { animation: wave-flow-rev 4.6s linear infinite; }

  @keyframes wave-flow {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes wave-flow-rev {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }

  .wave-circle.rest { --wave-fill: var(--wave-rest); --wave-fill-2: var(--wave-rest-2); }
  .wave-circle.done { --wave-fill: var(--wave-done); --wave-fill-2: var(--wave-done-2); }

  .timer-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 2;
  }

  /* 타이머 숫자는 예외 처리 — 원 밖으로 튀어나가지 않도록
     · 글자크기: 전체 슬라이더가 더 커도 최대 115%로 제한
     · 자간: 전체 자간의 0.5배만 적용하되, 원을 넘지 않도록 0.3cm 상한
       (가운데정렬 보정 text-indent도 같은 값으로 맞춤) */
  .timer-time {
    --timer-ls: min(calc(var(--letter-spacing) * 0.5), 0.3cm);
    font-size: calc(56px * min(var(--font-scale), 1.15));
    font-weight: 600;
    color: #FFFFFF;
    letter-spacing: var(--timer-ls) !important;
    text-indent: var(--timer-ls);
    line-height: 1;
    text-shadow: 0 2px 8px rgba(60,30,90,0.30);
  }

  .timer-sub {
    font-size: calc(14px * var(--font-scale));
    color: rgba(255,255,255,0.82);
    font-weight: 500;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* DOTS */
  .session-dots {
    display: flex;
    gap: 10px;
    margin: 28px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cream-dark);
    transition: all 0.4s ease;
  }
  .dot.filled { background: var(--blue-focus); }

  /* MAIN BUTTON */
  .main-btn {
    width: 100%;
    padding: 22px;
    border-radius: var(--radius-md);
    border: none;
    font-family: var(--current-font);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 0.01em;
    margin: 35px 0 20px;
    font-size: calc(17px * var(--font-scale));
    cursor: pointer;
  }
  .main-btn:active { transform: scale(0.97); }

  .btn-focus,
  .btn-rest,
  .btn-done {
    background: var(--blue-focus);
    color: #FFFFFF;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }

  .secondary-btn {
    width: 100%;
    padding: 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid rgba(155,111,208,0.25);
    background: var(--btn-secondary);
    font-family: var(--current-font);
    font-size: calc(15px * var(--font-scale));
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .secondary-btn:active { background: var(--btn-secondary-active); transform: scale(0.98); }

  /* ── SCREEN 2: CHECKLIST ── */
  .screen-header { padding: 28px 24px 16px; }

  .screen-title {
    font-size: calc(26px * var(--font-scale));
    font-weight: 600;
    color: var(--text-primary);
  }

  .screen-subtitle {
    font-size: calc(14px * var(--font-scale));
    color: var(--text-muted);
    margin-top: 4px;
  }

  .checklist-wrap {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
  }

  .check-item.active-task {
    border-color: var(--blue-focus);
    background: rgba(91,141,184,0.06);
  }

  .check-item.done-task { opacity: 0.55; }

  .check-box {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2.5px solid var(--cream-dark);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s ease;
    background: white;
  }

  .check-box.checked {
    background: var(--blue-focus);
    border-color: var(--blue-focus);
  }

  .check-box i { color: white; font-size: calc(13px * var(--font-scale)); opacity: 0; transition: opacity 0.2s; }
  .check-box.checked i { opacity: 1; }

  .check-text {
    flex: 1;
    font-size: calc(16px * var(--font-scale));
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
  }

  .done-task .check-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .check-tag {
    font-size: calc(11px * var(--font-scale));
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .tag-now,
  .tag-soon { background: var(--blue-pale); color: var(--blue-focus); }

  .add-task-btn {
    margin: 16px 24px 0;
    padding: 16px 20px;
    border: 2.5px dashed var(--cream-dark);
    border-radius: var(--radius-sm);
    background: transparent;
    font-family: var(--current-font);
    font-size: calc(15px * var(--font-scale));
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
  }
  .add-task-btn:hover { border-color: var(--blue-focus); color: var(--blue-light); }

  /* ── SCREEN 3: SETTINGS ── */
  .settings-section {
    padding: 0 24px;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: calc(12px * var(--font-scale));
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .setting-card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(155,111,208,0.15);
    cursor: pointer;
  }
  .setting-row:last-child { border-bottom: none; }

  .setting-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: calc(17px * var(--font-scale));
    flex-shrink: 0;
  }

  .icon-blue,
  .icon-mint,
  .icon-yellow,
  .icon-navy {
    background: var(--blue-pale);
    color: var(--blue-focus);
    transition: background 0.4s ease, color 0.4s ease;
  }

  .setting-info { flex: 1; }
  .setting-name { font-size: calc(16px * var(--font-scale)); font-weight: 500; color: var(--text-primary); }
  .setting-desc { font-size: calc(13px * var(--font-scale)); color: var(--text-muted); margin-top: 2px; }
  .setting-arrow { color: var(--text-muted); font-size: calc(13px * var(--font-scale)); }

  /* 종류 선택 인라인 버튼 — 이름 아래 "차임벨 >" 형태 */
  .setting-pick-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    padding: 4px 10px 4px 8px;
    background: var(--blue-pale);
    border: none;
    border-radius: 12px;
    color: var(--blue-focus);
    font-family: var(--current-font);
    font-size: calc(13px * var(--font-scale));
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .setting-pick-row .setting-desc {
    color: inherit;
    margin-top: 0;
    font-size: calc(13px * var(--font-scale));
  }
  .setting-pick-row .fa-chevron-right { font-size: calc(10px * var(--font-scale)); }
  .setting-pick-row:active {
    transform: scale(0.96);
    background: var(--btn-secondary-active);
  }

  /* 토글 off 일 때 설명/선택 버튼 흐리게 */
  .setting-info.disabled .setting-desc,
  .setting-info.disabled .setting-pick-row { opacity: 0.45; }

  /* TOGGLE */
  .toggle {
    width: 48px; height: 28px;
    border-radius: 14px;
    background: var(--cream-dark);
    position: relative;
    cursor: pointer;
    transition: background 0.3s ease;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--blue-focus); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toggle.on::after { transform: translateX(20px); }

  /* SLIDER */
  .slider-row {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(155,111,208,0.15);
  }

  .slider-label {
    display: flex; justify-content: space-between;
    font-size: calc(15px * var(--font-scale)); font-weight: 500; color: var(--text-primary);
    margin-bottom: 12px;
  }
  .slider-val { font-size: calc(14px * var(--font-scale)); color: var(--text-muted); font-weight: 400; }

  input[type=range] {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--cream-dark);
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--blue-focus);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(100,70,160,0.25);
  }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px;

    accent: '#2E6FB8', accentLight: '#5A95D8',
    accentPale: 'rgba(46,111,184,0.18)',
    waveBg: '#C5DEF5', waveBgRing: 'rgba(46,111,184,0.35)',
    waveFill: '#5A95D8', waveFill2: '#2E6FB8',
    creamDark: '#B8CDE8',
    textPrimary: '#152A4A', textSecondary: '#2E4A72', textMuted: '#5A7AA0',
    shadowDrop: 'rgba(46,111,184,0.22)',
  },
  '#F5F5F0': {
    bg: '#F5F5F0', bgCard: '#FBFBF7',
    btnSec: '#E6E6DE', btnSecActive: '#D4D4C8',
    accent: '#5A5440', accentLight: '#857D5E',
    accentPale: 'rgba(90,84,64,0.16)',
    waveBg: '#D8D4C0', waveBgRing: 'rgba(90,84,64,0.30)',
    waveFill: '#857D5E', waveFill2: '#5A5440',
    creamDark: '#CECABA',
    textPrimary: '#26221A', textSecondary: '#454132', textMuted: '#75705C',
    shadowDrop: 'rgba(90,84,64,0.22)',
  },
};

function applyPalette(t) {
  if (!t) return;
  const root = document.documentElement.style;
  root.setProperty('--bg', t.bg);
  root.setProperty('--bg-card', t.bgCard);
  root.setProperty('--btn-secondary', t.btnSec);
  root.setProperty('--btn-secondary-active', t.btnSecActive);
  root.setProperty('--blue-focus', t.accent);
  root.setProperty('--blue-light', t.accentLight);
  root.setProperty('--blue-pale', t.accentPale);
  root.setProperty('--wave-bg', t.waveBg);
  root.setProperty('--wave-bg-ring', t.waveBgRing);
  root.setProperty('--wave-fill', t.waveFill);
  root.setProperty('--wave-fill-2', t.waveFill2);
  root.setProperty('--wave-rest', t.waveFill);
  root.setProperty('--wave-rest-2', t.waveFill2);
  root.setProperty('--wave-done', t.waveFill);
  root.setProperty('--wave-done-2', t.waveFill2);
  root.setProperty('--cream-dark', t.creamDark);
  root.setProperty('--text-primary', t.textPrimary);
  root.setProperty('--text-secondary', t.textSecondary);
  root.setProperty('--text-muted', t.textMuted);
  root.setProperty('--navy', '#F5F0EB');
  root.setProperty('--shadow-wave-drop', t.shadowDrop || 'rgba(100,70,160,0.20)');
  document.body.style.background = t.bg;
}

// 저장된 스와치 색상이 있으면 해당 팔레트를 우선 적용하고,
// 없을 때만 모드별 기본 팔레트를 사용한다.
function applyTheme(mode) {
  const savedBg = _load('bgColor', '');
  if (savedBg && SWATCH_THEMES[savedBg]) {
    applyPalette(SWATCH_THEMES[savedBg]);
  } else {
    applyPalette(THEMES[mode] || THEMES.focus);
  }
}

  // ============================================================
  // SCREEN NAVIGATION
  // ============================================================
  function switchScreen(name, el) {
    // timer.js의 전역 변수에 직접 접근해서 타이머 일시정지
    if (name !== 'timer') {
      try {
        if (running) {
          running = false;
          clearInterval(intervalId);
          const mainBtn = document.getElementById('mainBtn');
          if (mainBtn) mainBtn.innerHTML = '<i class="fa fa-play"></i>&nbsp; 계속';
        }
      } catch(e) {}
    }
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    el.classList.add('active');
  }

  // ============================================================
  // COLOR SWATCHES
  // ============================================================
  function selectColor(el, color) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    const t = SWATCH_THEMES[color];
    if (t) { applyPalette(t); _save('bgColor', color); }
  }

  // ============================================================
  // LETTER SPACING (자간) — 전체 UI에 적용
  // 슬라이더 값(cm)을 --letter-spacing 변수로 반영하면
  // 위의 *:not(...) 규칙을 통해 모든 텍스트에 균일 적용된다.
  // 0cm ~ 1cm 범위. 가운데 정렬 보정은 text-indent로 처리.
  // ============================================================
  const LS_MIN = 0, LS_MAX = 0.5, LS_DEFAULT = 0;  /* 최소=기본=보통(0cm) */

  function setLetterSpacing(cm) {
    let v = parseFloat(cm);
    if (isNaN(v)) v = LS_DEFAULT;
    v = Math.min(LS_MAX, Math.max(LS_MIN, v));
    document.documentElement.style.setProperty('--letter-spacing', v + 'cm');
    if (typeof _save === 'function') _save('letterSpacing', String(v));
    const label = document.getElementById('letterSpacingVal');
    if (label) label.textContent = v <= 0 ? '기본' : v.toFixed(2) + 'cm';
  }

  function initLetterSpacing() {
    let saved = LS_DEFAULT;
    if (typeof _load === 'function') saved = parseFloat(_load('letterSpacing', String(LS_DEFAULT)));
    const slider = document.getElementById('letterSpacingSlider');
    if (slider) slider.value = saved;
    setLetterSpacing(saved);
  }

  // ============================================================
  // FONT SIZE (글자크기) — 전체 UI 비율 조절
  // 슬라이더 값(85~135 %)을 --font-scale 배율로 반영하면
  // 모든 font-size: calc(Npx * var(--font-scale)) 가 함께 커진다.
  // ============================================================
  const FS_MIN = 100, FS_MAX = 135;  /* 최소=보통(100%) */

  function setFontScale(pct) {
    let p = parseInt(pct, 10) || 100;
    p = Math.min(FS_MAX, Math.max(FS_MIN, p));
    const scale = p / 100;
    document.documentElement.style.setProperty('--font-scale', String(scale));
    if (typeof _save === 'function') _save('fontScale', String(p));
    const label = document.getElementById('fontScaleVal');
    if (label) label.textContent = p === 100 ? '기본' : p + '%';
  }

  function initFontScale() {
    let saved = 100;
    if (typeof _load === 'function') saved = parseInt(_load('fontScale', '100'), 10) || 100;
    const slider = document.getElementById('fontScaleSlider');
    if (slider) slider.value = saved;
    setFontScale(saved);
  }

  // ============================================================
  // SOUND — 두 라이브러리: bgm(공부 배경 소리) / alarm(종료 알림음)
  // alarm.js 의 Sounds.bgm, Sounds.alarm 과 연동
  // ============================================================

  // 공통 선택 처리: 어떤 섹션(.sound-list-bgm / .sound-list-alarm)에 속하는지 확인
  function selectSound(el, kind) {
    const key = el.dataset.key;
    if (!key || !window.Sounds) return;
    const player = window.Sounds[kind];
    if (!player) return;

    // 같은 섹션 내 다른 아이콘들의 selected 해제
    const section = el.closest('.setting-card');
    if (section) section.querySelectorAll('.sound-icon').forEach(i => i.classList.remove('selected'));
    el.querySelector('.sound-icon').classList.add('selected');

    player.select(key);
    player.preview(key);

    const info = player.getSelectedInfo();
    const descId = kind === 'bgm' ? 'bgmSoundDesc' : 'alarmSoundDesc';
    const desc = document.getElementById(descId);
    if (info && desc) desc.textContent = info.name;
  }
  function selectBgm(el)   { selectSound(el, 'bgm'); }
  function selectAlarm(el) { selectSound(el, 'alarm'); }

  // 알림 행 클릭 → 해당 사운드 섹션으로 스크롤 + 현재 선택된 음 미리듣기
  function scrollToBgm() {
    const el = document.getElementById('bgmSection');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (window.Sounds) window.Sounds.bgm.preview(window.Sounds.bgm.getSelected());
  }
  // 종료 알림음 모달 — 8가지 알람음 시트로 띄우기
  function openAlarmSheet() {
    const m = document.getElementById('modal-alarm-sounds');
    if (m) m.classList.add('show');
  }
  function closeAlarmSheet() {
    if (window.Sounds) window.Sounds.alarm.stopPreview();
    const m = document.getElementById('modal-alarm-sounds');
    if (m) m.classList.remove('show');
  }

  // ────────────────────────────────────────────────
  // 나만의 알림음 — 핸드폰 뮤직/파일 앱에서 오디오 선택
  // ────────────────────────────────────────────────
  const CUSTOM_ALARM_MAX_BYTES = 3 * 1024 * 1024; // 3MB

  function pickCustomAlarmFile() {
    const input = document.getElementById('customAlarmInput');
    if (input) input.click();
  }

  function onCustomAlarmFile(event) {
    const file = event.target.files && event.target.files[0];
    event.target.value = ''; // 같은 파일 다시 선택 가능하게 초기화
    if (!file) return;
    if (!window.Alarm) return;

    if (file.size > CUSTOM_ALARM_MAX_BYTES) {
      alert('파일이 너무 커요. 3MB 이하의 짧은 오디오를 골라주세요.');
      return;
    }
    if (file.type && file.type.indexOf('audio') !== 0) {
      alert('오디오 파일만 추가할 수 있어요.');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const baseName = (file.name || '나의 알림음').replace(/\.[^.]+$/, '');
      try {
        const key = window.Alarm.addCustom(baseName, dataUrl);
        renderCustomAlarms();
        if (window.Sounds && window.Sounds.alarm) {
          window.Sounds.alarm.select(key);
          window.Sounds.alarm.preview(key);
          const info = window.Sounds.alarm.getSelectedInfo();
          const desc = document.getElementById('alarmSoundDesc');
          if (info && desc) desc.textContent = info.name;
        }
        syncAlarmSelection();
      } catch (err) {
        alert(err && err.message ? err.message : '알림음 추가에 실패했어요.');
      }
    };
    reader.onerror = () => alert('파일을 읽지 못했어요.');
    reader.readAsDataURL(file);
  }

  function renderCustomAlarms() {
    const list = document.getElementById('alarmSoundsList');
    if (!list || !window.Alarm) return;
    // 기존 커스텀 항목 제거
    list.querySelectorAll('.sound-option.custom').forEach(el => el.remove());

    const customs = window.Alarm.listCustom();
    customs.forEach(c => {
      const item = document.createElement('div');
      item.className = 'sound-option custom';
      item.dataset.key = c.key;
      item.addEventListener('click', () => selectAlarm(item));

      const icon = document.createElement('div');
      icon.className = 'sound-icon';
      icon.innerHTML = '<i class="fa fa-music"></i>';

      const name = document.createElement('div');
      name.className = 'sound-name';
      name.textContent = c.name;

      const del = document.createElement('button');
      del.className = 'sound-delete';
      del.setAttribute('aria-label', '삭제');
      del.innerHTML = '<i class="fa fa-xmark"></i>';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        removeCustomAlarm(c.key);
      });

      const play = document.createElement('div');
      play.className = 'sound-play';
      play.innerHTML = '<i class="fa fa-play"></i>';

      item.appendChild(icon);
      item.appendChild(name);
      item.appendChild(del);
      item.appendChild(play);
      // 추가 행(customAlarmAddRow) 바로 위에 삽입 — 추가 버튼은 항상 마지막
      const addRow = document.getElementById('customAlarmAddRow');
      if (addRow && addRow.parentNode === list) list.insertBefore(item, addRow);
      else list.appendChild(item);
    });
  }

  function removeCustomAlarm(key) {
    if (!window.Alarm || !window.Sounds) return;
    const wasSelected = window.Sounds.alarm.getSelected() === key;
    window.Sounds.alarm.stopPreview();
    window.Alarm.removeCustom(key);
    if (wasSelected) {
      window.Sounds.alarm.select('classic');
      const info = window.Sounds.alarm.getSelectedInfo();
      const desc = document.getElementById('alarmSoundDesc');
      if (info && desc) desc.textContent = info.name;
    }
    renderCustomAlarms();
    syncAlarmSelection();
  }

  function syncAlarmSelection() {
    const list = document.getElementById('alarmSoundsList');
    if (!list || !window.Sounds) return;
    const sel = window.Sounds.alarm.getSelected();
    list.querySelectorAll('.sound-option').forEach(opt => {
      const icon = opt.querySelector('.sound-icon');
      if (icon) icon.classList.toggle('selected', opt.dataset.key === sel);
    });
  }

  // 종료 알림음 on/off 토글
  function toggleAlarmEnabled(el) {
    el.classList.toggle('on');
    const on = el.classList.contains('on');
    if (window.Alarm) window.Alarm.setEnabled(on);
    const info = el.parentElement.querySelector('.setting-info');
    if (info) info.classList.toggle('disabled', !on);
  }

  // 진동 on/off — 켜질 때 한번 진동해서 확인
  function toggleVibration(el) {
    el.classList.toggle('on');
    const on = el.classList.contains('on');
    if (!window.Alarm) return;
    window.Alarm.setVibrationEnabled(on);
    if (on) window.Alarm.vibrate([300, 100, 300, 100, 500]);
  }

  // 음성 안내(TTS) on/off — 켜질 때 짧은 멘트로 동작 확인
  function toggleTts(el) {
    el.classList.toggle('on');
    const on = el.classList.contains('on');
    if (window.Alarm) {
      window.Alarm.setTtsEnabled(on);
      if (on) window.Alarm.speak('음성 안내가 켜졌어요');
      else window.Alarm.stopSpeak();
    }
  }

  // 초기 진입 시: 저장된 선택을 UI에 반영하고 이벤트 바인딩
  window.addEventListener('DOMContentLoaded', () => {
    // 자간 / 글자크기 설정 복원 — 사운드 로딩 여부와 무관하게 항상 먼저 적용
    initLetterSpacing();
    initFontScale();

    if (!window.Sounds) return;

    function syncSection(kind, sectionId, descId) {
      const player = window.Sounds[kind];
      const key = player.getSelected();
      const info = player.getSelectedInfo();
      const section = document.getElementById(sectionId);
      if (section) {
        section.querySelectorAll('.sound-option').forEach(opt => {
          const icon = opt.querySelector('.sound-icon');
          if (opt.dataset.key === key) icon.classList.add('selected');
          else icon.classList.remove('selected');
        });
      }
      const desc = document.getElementById(descId);
      if (info && desc) desc.textContent = info.name;

      player.on('play', (k) => {
        if (!section) return;
        section.querySelectorAll('.sound-option').forEach(o => {
          o.classList.toggle('playing', o.dataset.key === k);
        });
      });
      player.on('stop', () => {
        if (!section) return;
        section.querySelectorAll('.sound-option').forEach(o => o.classList.remove('playing'));
      });
    }
    syncSection('bgm',   'bgmSection',      'bgmSoundDesc');
    // 저장된 커스텀 알림음을 먼저 렌더 → syncSection 이 함께 처리
    renderCustomAlarms();
    syncSection('alarm', 'alarmSoundsList', 'alarmSoundDesc');

    // 진동 / 음성 안내 / 종료 알림음 토글 상태 복원
    if (window.Alarm) {
      const alarmToggle = document.getElementById('alarmToggle');
      const alarmEnabled = window.Alarm.isEnabled();
      if (alarmToggle) {
        alarmToggle.classList.toggle('on', alarmEnabled);
        const info = alarmToggle.parentElement.querySelector('.setting-info');
        if (info) info.classList.toggle('disabled', !alarmEnabled);
      }
      const vibToggle = document.getElementById('vibrationToggle');
      if (vibToggle) vibToggle.classList.toggle('on', window.Alarm.isVibrationEnabled());
      const ttsToggle = document.getElementById('ttsToggle');
      if (ttsToggle) ttsToggle.classList.toggle('on', window.Alarm.isTtsEnabled());
    }

    // 알람 모달을 외부 영역 탭으로 닫을 때도 미리듣기 정지
    const alarmModal = document.getElementById('modal-alarm-sounds');
    if (alarmModal) {
      alarmModal.addEventListener('click', (e) => {
        if (e.target === alarmModal && window.Sounds) window.Sounds.alarm.stopPreview();
      });
    }
  });
</script>
</head>
<body>

<div class="phone-frame" id="app">

  <!-- ────────────────────
       SCREEN: TIMER
  ──────────────────────── -->
  <div class="screen timer-screen active" id="screen-timer">

    <!-- Mode tabs -->
    <div class="demo-tabs">
      <button class="demo-tab active" onclick="setMode('focus',this)">집중</button>
      <button class="demo-tab" onclick="setMode('rest',this)">휴식</button>
      <button class="demo-tab" id="doneTab" onclick="setMode('done',this)">긴 휴식</button>
    </div>

    <!-- Session badge -->
    <div style="display:flex;justify-content:center;">
      <div class="session-badge" id="sessionBadge">리서치 정리</div>
    </div>

    <!-- Mode label
    <div class="session-label" id="modeLabel"></div> -->

    <!-- Session dots -->
    <div style="display:flex;justify-content:center;margin-top:8px;">
      <div class="session-dots">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
      </div>
    </div>

    <!-- Timer wave -->
    <div class="timer-ring-wrap pulse">
      <div class="wave-circle" id="waveCircle">
        <!-- 뒤쪽 물결 레이어 -->
        <div class="wave-fill back" id="waveFillBack">
          <div class="wave-body"></div>
          <div class="wave-surface flow-back">
            <svg viewBox="0 0 400 26" preserveAspectRatio="none">
              <path class="wave-path" d="M0,13 C25,2 75,2 100,13 C125,24 175,24 200,13 C225,2 275,2 300,13 C325,24 375,24 400,13 L400,26 L0,26 Z"/>
            </svg>
          </div>
        </div>
        <!-- 앞쪽 물결 레이어 -->
        <div class="wave-fill front" id="waveFillFront">
          <div class="wave-body"></div>
          <div class="wave-surface flow-front">
            <svg viewBox="0 0 400 26" preserveAspectRatio="none">
              <path class="wave-path" d="M0,13 C25,24 75,24 100,13 C125,2 175,2 200,13 C225,24 275,24 300,13 C325,2 375,2 400,13 L400,26 L0,26 Z"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="timer-inner">
        <div class="timer-time" id="timerDisplay">25:00</div>
      </div>
    </div>

    <!-- Buttons -->
    <div style="padding:0 24px;width:100%;">
      <button class="main-btn btn-focus" id="mainBtn" onclick="toggleTimer()">
        <i class="fa fa-play"></i>&nbsp; 시작
      </button>
      <button class="secondary-btn" id="resetBtn" onclick="resetTimer()">
        <i class="fa fa-rotate-right" style="font-size: calc(14px * var(--font-scale));margin-right:6px;"></i> 다시 시작
      </button>
      <button class="secondary-btn" id="longRestResetBtn" style="display:none;" onclick="resetAll()">
        <i class="fa fa-rotate-left" style="font-size: calc(14px * var(--font-scale));margin-right:6px;"></i> 새로 시작
      </button>
    </div>

  </div>

  <!-- ────────────────────
       SCREEN: CHECKLIST
  ──────────────────────── -->
  <div class="screen" id="screen-checklist">
    <div class="screen-header">
      <div class="screen-title">할 일</div>
    </div>

    <div class="progress-chips">
      <div class="chip active" id="chip-all"     onclick="TaskManager.setFilter('all')">전체 <span id="count-all">0</span></div>
      <div class="chip"        id="chip-done"    onclick="TaskManager.setFilter('done')">완료 <span id="count-done">0</span></div>
      <div class="chip"        id="chip-pending" onclick="TaskManager.setFilter('pending')">남은 작업 <span id="count-pending">0</span></div>
    </div>

    <div style="height:16px;"></div>

    <div class="checklist-wrap" id="checklistWrap"></div>

    <!-- 인라인 작업 추가 입력창 -->
    <div class="add-task-input-wrap" id="addTaskWrap">
      <input type="text" class="add-task-input" id="addTaskInput"
             placeholder="새 작업을 입력하세요"
             onkeydown="if(event.key==='Enter')TaskManager.confirmAdd(); if(event.key==='Escape')TaskManager.cancelAdd();">
      <div class="add-task-input-actions">
        <button class="add-cancel-btn"  onclick="TaskManager.cancelAdd()"><i class="fa-solid fa-x"></i></button>
        <button class="add-confirm-btn" onclick="TaskManager.confirmAdd()"><i class="fa-solid fa-check"></i></button>
      </div>
    </div>

    <button class="add-task-btn" id="addTaskBtn" onclick="TaskManager.openAdd()">
      <i class="fa fa-plus" style="font-size: calc(16px * var(--font-scale));color:var(--text-muted);"></i>
      작업 추가
    </button>

    <!-- 읽기 가이드 토글
    <div class="reading-guide-wrap" id="readingGuideWrap">
      <button class="reading-guide-btn" onclick="ReadingGuide.toggle()">
        <div class="reading-guide-icon-wrap" id="readingGuideIcon">
          <i class="fa fa-glasses"></i>
        </div>
        <div class="reading-guide-info">
          <div class="reading-guide-name">읽기 가이드</div>
          <div class="reading-guide-desc" id="readingGuideDesc">꺼짐</div>
        </div>
        <div class="toggle" id="readingGuideSwitch"></div>
      </button>
    </div> -->

  </div>

  <!-- ────────────────────
       SCREEN: SETTINGS
  ──────────────────────── -->
  <div class="screen" id="screen-settings">
    <div class="screen-header">
      <div class="screen-title">설정</div>
    </div>

    <!-- Session settings -->
    <div class="settings-section">
      <div class="section-label">세션</div>
      <div class="setting-card">
        <div class="time-buttons-row">
          
          <button class="time-btn" onclick="openTimeSheet('focus')">
            <div class="time-btn-val"><span id="focusTimeVal">25</span></div>
            <div class="time-btn-unit">분</div>
            <div class="time-btn-label">집중</div>
          </button>
          <button class="time-btn" onclick="openTimeSheet('rest')">
            <div class="time-btn-val"><span id="restTimeVal">5</span></div>
            <div class="time-btn-unit">분</div>
            <div class="time-btn-label">짧은 휴식</div>
          </button>
          <button class="time-btn" onclick="openTimeSheet('longRest')">
            <div class="time-btn-val"><span id="longRestTimeVal">15</span></div>
            <div class="time-btn-unit">분</div>
            <div class="time-btn-label">긴 휴식</div>
          </button>
          <button class="time-btn" onclick="openTimeSheet('count')">
            <div class="time-btn-val"><span id="countVal">4</span></div>
            <div class="time-btn-unit">회</div>
            <div class="time-btn-label">세션</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Background color -->
    <div class="settings-section">
      <div class="section-label">배경</div>
      <div class="setting-card">
        <div class="color-row" style="border-bottom:none;">
          <div class="color-swatches">
            <!-- <div class="swatch selected" style="background:#EDE6F8;" onclick="selectColor(this,'#EDE6F8')" title="라벤더"></div> -->
            <div class="swatch" style="background:#E8F4F0;" onclick="selectColor(this,'#E8F4F0')" title="민트"></div>
            <div class="swatch" style="background:#FFF0F3;" onclick="selectColor(this,'#FFF0F3')" title="핑크"></div>
            <div class="swatch" style="background:#FFF8E8;" onclick="selectColor(this,'#FFF8E8')" title="피치"></div>
            <!-- <div class="swatch" style="background:#EAF2FF;" onclick="selectColor(this,'#EAF2FF')" title="스카이블루"></div> -->
            <div class="swatch" style="background:#F5F5F0;" onclick="selectColor(this,'#F5F5F0')" title="크림"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Text — 자간 + 글자크기 (한 카드에 연속 배치) -->
    <div class="settings-section">
      <div class="section-label">글자</div>
      <div class="setting-card">
        <!-- 자간 -->
        <div class="slider-row">
          <div class="slider-label">
            <span>자간</span>
          </div>
          <input type="range" id="letterSpacingSlider" min="0" max="0.5" step="0.05" value="0"
                 oninput="setLetterSpacing(this.value)" aria-label="자간 조절">
          <div class="time-slider-range" style="margin-top:8px;">
            <span>좁게</span>
            <span>넓게</span>
          </div>
        </div>
        <!-- 글자크기 -->
        <div class="slider-row" style="border-bottom:none;">
          <div class="slider-label">
            <span>글자크기</span>
          </div>
          <input type="range" id="fontScaleSlider" min="100" max="135" step="5" value="100"
                 oninput="setFontScale(this.value)" aria-label="글자크기 조절">
          <div class="time-slider-range" style="margin-top:8px;">
            <span>작게</span>
            <span>크게</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Notification & sound -->
    <div class="settings-section">
      <div class="section-label">알림</div>
      <div class="setting-card">
        <div class="setting-row">
          <div class="setting-icon icon-blue">            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" style="width:22px;height:22px;fill:currentColor;display:block;flex-shrink:0;">
              <path d="M416 64C451.3 64 480 92.7 480 128L480 512C480 547.3 451.3 576 416 576L224 576C188.7 576 160 547.3 160 512L160 128C160 92.7 188.7 64 224 64L416 64zM280 480C266.7 480 256 490.7 256 504C256 517.3 266.7 528 280 528L360 528C373.3 528 384 517.3 384 504C384 490.7 373.3 480 360 480L280 480zM80.8 197.4C90.2 189.7 104.1 190.3 112.9 199.1C122.3 208.5 122.3 223.7 112.9 233L81.9 264L107.3 289.4L110.2 292.6C116.5 300.3 120 310 120 320C120 331.5 115.4 342.5 107.3 350.6L81.9 376L112.9 407L114.6 408.8C122.3 418.2 121.7 432.1 112.9 440.9C104.1 449.7 90.2 450.2 80.8 442.6L79 441L44.7 406.6C37.6 399.5 33.2 390.2 32.2 380.3L32 376L32.2 371.7C33.2 361.8 37.6 352.5 44.7 345.4L70.1 320L44.7 294.6C37.6 287.5 33.2 278.2 32.2 268.3L32 264L32.2 259.7C33.2 249.8 37.6 240.5 44.7 233.4L79 199L80.8 197.4zM527 199C535.8 190.2 549.7 189.7 559.1 197.3L560.9 199L595.2 233.3C602.3 240.4 606.7 249.7 607.7 259.6L607.9 263.9L607.7 268.2C606.7 278.1 602.3 287.4 595.2 294.5L569.8 319.9L595.2 345.3C602.3 352.4 606.7 361.7 607.7 371.6L607.9 375.9L607.7 380.2C606.7 390.1 602.3 399.4 595.2 406.5L560.9 440.8L559.1 442.5C549.7 450.2 535.8 449.6 527 440.8C518.2 432 517.7 418.1 525.3 408.7L527 406.9L558 375.9L532.6 350.5C524.5 342.4 519.9 331.4 519.9 319.9C519.9 309.9 523.4 300.2 529.7 292.5L532.6 289.3L558 263.9L527 232.9C517.6 223.5 517.6 208.3 527 199z"/>
            </svg></div>
          <div class="setting-info">
            <div class="setting-name">진동</div>
          </div>
          <div class="toggle on" id="vibrationToggle" onclick="toggleVibration(this)"></div>
        </div>
        <div class="setting-row">
          <div class="setting-icon icon-mint"><i class="fa fa-volume-high"></i></div>
          <div class="setting-info">
            <div class="setting-name">음성 안내</div>
          </div>
          <div class="toggle on" id="ttsToggle" onclick="toggleTts(this)"></div>
        </div>
        <div class="setting-row" style="border-bottom:none;">
          <div class="setting-icon icon-yellow"><i class="fa fa-bell"></i></div>
          <div class="setting-info">
            <div class="setting-name">종료 알림음</div>
            <button class="setting-pick-row" onclick="openAlarmSheet()" aria-label="알람음 선택">
              <span class="setting-desc" id="alarmSoundDesc">비프음</span>
              <i class="fa fa-chevron-right"></i>
            </button>
          </div>
          <div class="toggle on" id="alarmToggle" onclick="toggleAlarmEnabled(this)"></div>
        </div>
      </div>
    </div>

    <!-- Sound choices — 배경 소리 (공부 중 잔잔한 BGM) -->
    <div class="settings-section" id="bgmSection">
      <div class="section-label">배경 소리</div>
      <div class="setting-card">
        <div class="sound-option" data-key="forest" onclick="selectBgm(this)">
          <div class="sound-icon selected"><i class="fa fa-tree"></i></div>
          <div>
            <div class="sound-name">숲</div>
            <!-- <div class="sound-desc">새소리 · 바람</div> -->
          </div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="rain" onclick="selectBgm(this)">
          <div class="sound-icon"><i class="fa fa-cloud-rain"></i></div>
          <div>
            <div class="sound-name">빗소리</div>
            <!-- <div class="sound-desc">빗소리</div> -->
          </div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="lofi" onclick="selectBgm(this)">
          <div class="sound-icon"><i class="fa fa-headphones"></i></div>
          <div>
            <div class="sound-name">잔잔한 음악</div>
            <!-- <div class="sound-desc">잔잔한 음악</div> -->
          </div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="white" onclick="selectBgm(this)">
          <div class="sound-icon"><i class="fa fa-wave-square"></i></div>
          <div>
            <div class="sound-name">백색 소음</div>
            <!-- <div class="sound-desc">백색 소음</div> -->
          </div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ────────────────────
       BOTTOM NAVIGATION
  ──────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchScreen('timer',this)">
      <i class="fa-solid fa-stopwatch"></i>
      <span>타이머</span>
    </button>
    <button class="nav-item" onclick="switchScreen('checklist',this)">
      <i class="fa fa-list-check"></i>
      <span>작업</span>
    </button>
    <button class="nav-item" onclick="switchScreen('settings',this)">
      <i class="fa-solid fa-wrench"></i>
      <span>설정</span>
    </button>
  </nav>

  <!-- ────────────────────
       MODALS
  ──────────────────────── -->

  <!-- Focus end modal -->
  <div class="modal-overlay" id="modal-focus-end">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon-wrap modal-icon-focus">
        <i class="fa fa-sun"></i>
      </div>
      <div class="modal-title">집중 끝</div>
      <!-- <div class="modal-body">쉬어볼까요?</div> -->
      <div class="modal-btn-group">
        <!-- 쉬기: 휴식 모드로 전환 + 자동 시작 -->
        <button class="main-btn btn-rest" onclick="startRestMode(true)">
          <i class="fa fa-leaf"></i>&nbsp; 쉬기
        </button>
        <!-- 이어가기: 집중 모드 유지 + 자동 시작 -->
        <button class="secondary-btn" onclick="continueFocus()">
          <i class="fa-solid fa-arrow-right"></i>&nbsp; 이어가기
        </button>
      </div>
    </div>
  </div>

  <!-- Rest end modal -->
  <div class="modal-overlay" id="modal-rest-end">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon-wrap modal-icon-rest">
        <i class="fa fa-mug-hot"></i>
      </div>
      <div class="modal-title">쉬기 끝</div>
      <!-- <div class="modal-body">준비됐어요?</div> -->
      <div class="modal-btn-group">
        <!-- 집중 시작하기: 집중 모드로 전환 + 자동 시작 -->
        <button class="main-btn btn-focus" onclick="startFocusMode(true)">
          <i class="fa fa-play"></i>&nbsp; 집중 시작
        </button>
        <!-- 좀 더 쉬기: 집중 창으로 전환, 수동 시작 -->
        <button class="secondary-btn" onclick="continueRest()">
          더 쉬기
        </button>
      </div>
    </div>
  </div>

  <!-- Done modal (all sessions complete) -->
  <div class="modal-overlay" id="modal-done">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon-wrap modal-icon-done" style="animation:expand-circle 0.6s ease forwards;">
        <i class="fa fa-star"></i>
      </div>
      <div class="modal-title">완료!</div>
      <!-- <div class="modal-body">수고했어요.</div> -->
      <div class="modal-btn-group">
        <!-- 새로 시작: 모든 값 초기화 후 집중 모드 (수동 시작) -->
        <button class="main-btn btn-done" onclick="handleDoneReset()">
          <i class="fa fa-arrow-rotate-left"></i>&nbsp; 새로 시작
        </button>
      </div>
    </div>
  </div>

  <!-- 세션 초기화 확인 팝업 -->
  <div class="modal-overlay" id="modal-session-reset">
    <div class="modal-sheet">
      <div class="modal-title">세션이 초기화 돼요!</div>
      <div class="modal-btn-group">
        <button class="main-btn btn-focus" onclick="confirmSessionReset()">
          <i class="fa fa-check"></i>&nbsp; 확인
        </button>
        <button class="secondary-btn" onclick="cancelSessionReset()">
          취소
        </button>
      </div>
    </div>
  </div>

  <!-- 모든 세션 완료 모달 -->
  <div class="modal-overlay" id="modal-all-done">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon-wrap modal-icon-done" style="animation:expand-circle 0.6s ease forwards;">
        <i class="fa fa-star"></i>
      </div>
      <div class="modal-title">모든 세션 완료!</div>
      <!-- <div class="modal-body">수고했어요. 이제 쉬어볼까요?</div> -->
      <div class="modal-btn-group">
        <button class="main-btn btn-done" onclick="startLongRest()">
          <i class="fa fa-moon"></i>&nbsp; 길게 쉬기
        </button>
        <button class="secondary-btn" onclick="startNewSessionFromAllDone()">
          <i class="fa fa-arrow-rotate-left" style="font-size: calc(14px * var(--font-scale));margin-right:6px;"></i> 새로 시작
        </button>
      </div>
    </div>
  </div>

  <!-- Time picker bottom sheet -->
  <div class="modal-overlay" id="modal-time-sheet">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="timeSheetTitle">집중 시간</div>
      <div class="time-picker">
        <button class="time-step" onclick="adjustTime(-1)" aria-label="감소">−</button>
        <div class="time-display" id="timeSheetValue">25</div>
        <button class="time-step" onclick="adjustTime(1)" aria-label="증가">+</button>
      </div>
      <div style="text-align:center;font-size: calc(18px * var(--font-scale));color:var(--text-secondary);margin-bottom:12px;">
        <span id="timeSheetUnit">분</span>
      </div>
      <div class="time-slider-wrap">
        <input type="range" id="timeSheetSlider" min="5" max="120" value="25" step="1"
          oninput="onSliderInput(this.value)">
        <div class="time-slider-range">
          <span id="timeSheetMin">5분</span>
          <span id="timeSheetMax">120분</span>
        </div>
      </div>
      <div class="modal-btn-group">
        <button class="main-btn btn-focus" onclick="saveTimeSheet()">
          <i class="fa fa-check"></i>&nbsp; 저장
        </button>
        <button class="secondary-btn" onclick="closeModal('time-sheet')">
          취소
        </button>
      </div>
    </div>
  </div>

  <!-- 종료 알림음 선택 시트 -->
  <div class="modal-overlay" id="modal-alarm-sounds">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">종료 알림음</div>
      <div class="modal-body" style="margin-bottom:8px;">탭하면 미리 들을 수 있어요.</div>
      <div class="setting-card" id="alarmSoundsList" style="margin-top:14px;">
        <div class="sound-option" data-key="classic" onclick="selectAlarm(this)">
          <div class="sound-icon selected"><i class="fa fa-bell"></i></div>
          <div class="sound-name">기본</div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="fastBeep" onclick="selectAlarm(this)">
          <div class="sound-icon"><i class="fa fa-bolt"></i></div>
          <div class="sound-name">빠름</div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="digital" onclick="selectAlarm(this)">
          <div class="sound-icon"><i class="fa fa-microchip"></i></div>
          <div class="sound-name">디지털</div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>
        <div class="sound-option" data-key="vintage" onclick="selectAlarm(this)">
          <div class="sound-icon"><i class="fa fa-clock-rotate-left"></i></div>
          <div class="sound-name">빈티지</div>
          <div class="sound-play"><i class="fa fa-play"></i></div>
        </div>

        <!-- 핸드폰 뮤직/파일 앱에서 직접 오디오 선택 — 비프음 행과 같은 모양 -->
        <div class="sound-option sound-option-add" id="customAlarmAddRow" onclick="pickCustomAlarmFile()">
          <div class="sound-icon"><i class="fa fa-plus"></i></div>
          <div>
            <div class="sound-name">나만의 알림음 추가하기</div>
            <div class="sound-desc">뮤직앱, 파일앱에서 불러오기 (3MG)</div>
          </div>
        </div>
      </div>

      <!-- 파일 선택용 (숨김) -->
      <input type="file" id="customAlarmInput" accept="audio/*"
             style="display:none;" onchange="onCustomAlarmFile(event)">

      <div class="modal-btn-group">
        <button class="main-btn btn-focus" onclick="closeAlarmSheet()">
          <i class="fa fa-check"></i>&nbsp; 완료
        </button>
      </div>
    </div>
  </div>

  <!-- 작업 액션 시트 (1.5초 롱 프레스) -->
  <div class="modal-overlay" id="modal-task-action">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="taskActionTitle" style="font-size: calc(16px * var(--font-scale));margin-bottom:16px;word-break:break-all;"></div>
      <div class="modal-btn-group" style="flex-direction:column;gap:10px;">
        <button class="main-btn btn-focus" onclick="TaskManager.openEdit()">
          <i class="fa fa-pen"></i>&nbsp; 수정
        </button>
        <button class="main-btn" style="background:var(--btn-secondary);color:var(--text-primary);" onclick="TaskManager.deleteTask()">
          <i class="fa fa-trash"></i>&nbsp; 삭제
        </button>
        <button class="secondary-btn" onclick="TaskManager.closeActionModal()">취소</button>
      </div>
    </div>
  </div>

  <!-- 작업 수정 시트 -->
  <div class="modal-overlay" id="modal-task-edit">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">작업 수정</div>
      <input type="text" class="modal-input" id="taskEditInput" placeholder="작업 내용"
             style="margin-top:24px;"
             onkeydown="if(event.key==='Enter')TaskManager.saveEdit(); if(event.key==='Escape')TaskManager.closeEditModal();">
      <div class="modal-btn-group">
        <button class="main-btn btn-focus" onclick="TaskManager.saveEdit()">
          <i class="fa fa-check"></i>&nbsp; 저장
        </button>
        <button class="secondary-btn" onclick="TaskManager.closeEditModal()">취소</button>
      </div>
    </div>
  </div>

</div>

</body>
</html>
